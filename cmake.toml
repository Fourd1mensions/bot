# Reference: https://build-cpp.github.io/cmkr/cmake-toml
[project]
name = "bot"
cmake-before = """
set(DPP_BUILD_TEST OFF CACHE BOOL "" FORCE)
set(SPDLOG_FMT_EXTERNAL ON CACHE BOOL "" FORCE)
"""

[options]
CMAKE_EXPORT_COMPILE_COMMANDS = true

[variables]
CMAKE_BUILD_TYPE = "Release"

[fetch-content]
fmt = { git = "https://github.com/fmtlib/fmt.git", tag = "11.0.2" }
spdlog = { git = "https://github.com/gabime/spdlog.git", tag = "v1.14.0" }
dpp = { git = "https://github.com/brainboxdotcc/DPP.git", tag = "v10.0.35" }
cpr = { git = "https://github.com/libcpr/cpr.git", tag = "3b15fa82ea74739b574d705fea44959b58142eb8" }
crow = { git = "https://github.com/CrowCpp/Crow.git", tag = "v1.2.0" }
pqxx = { git = "https://github.com/jtv/libpqxx.git", tag = "7.9.2" }

[find-package.Threads]
required = true
[find-package.OpenSSL]
required = true
[find-package.libzip]
required = true
[find-package.PkgConfig]
required = true

[target.discord-bot]
type = "executable"
sources = ["src/*.cpp", "src/services/*.cpp"]
include-directories = ["include"]
compile-features = ["cxx_std_23"]
cmake-before = """
pkg_check_modules(LIBMEMCACHED REQUIRED libmemcached)
"""
link-libraries = [
  "fmt::fmt",
  "spdlog::spdlog",
  "Threads::Threads",
  "OpenSSL::Crypto",
  "OpenSSL::SSL",
  "cpr::cpr",
  "dpp",
  "tbb",
  "Crow::Crow",
  "libzip::zip",
  "pqxx",
]
cmake-after = """
target_link_libraries(discord-bot PRIVATE ${LIBMEMCACHED_LIBRARIES})
target_include_directories(discord-bot PRIVATE ${LIBMEMCACHED_INCLUDE_DIRS})
target_compile_options(discord-bot PRIVATE ${LIBMEMCACHED_CFLAGS_OTHER})
"""
