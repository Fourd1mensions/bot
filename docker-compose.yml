services:
  postgres:
    image: postgres:17-alpine
    container_name: patchouli_postgres
    restart: unless-stopped
    ports:
      - "9183:9183"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patchouli}
      POSTGRES_USER: ${POSTGRES_USER:-patchouli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchouli_pass}
      PGPORT: 9183
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patchouli} -p 9183"]
      interval: 10s
      timeout: 5s
      retries: 5

  memcached:
    image: memcached:1.6-alpine
    container_name: patchouli_memcached
    restart: unless-stopped
    ports:
      - "9184:9184"
    command: memcached -m 256 -I 10m -p 9184
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9184"]
      interval: 10s
      timeout: 5s
      retries: 5

  rosu-pp:
    build:
      context: ${ROSU_PP_SERVICE_PATH:-../rosu-pp-service}
    container_name: patchouli_rosu_pp
    restart: unless-stopped
    ports:
      - "50051:50051"
    volumes:
      # Mount beatmap data directory (read-only for security)
      - ./.data:/data:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      PP_SERVICE_ADDR: "[::]:50051"
      PP_SERVICE_CACHE_SIZE: ${PP_SERVICE_CACHE_SIZE:-5000}
      PP_SERVICE_LOG_FORMAT: json
    # Note: distroless image has no curl/wget, rely on gRPC channel state for health
    # External monitoring should use /health endpoint
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    driver: local
