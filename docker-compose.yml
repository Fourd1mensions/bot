services:
  postgres:
    image: postgres:17-alpine
    container_name: patchouli_postgres
    restart: unless-stopped
    ports:
      - "9183:9183"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patchouli}
      POSTGRES_USER: ${POSTGRES_USER:-patchouli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchouli_pass}
      PGPORT: 9183
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patchouli} -p 9183"]
      interval: 10s
      timeout: 5s
      retries: 5

  memcached:
    image: memcached:1.6-alpine
    container_name: patchouli_memcached
    restart: unless-stopped
    ports:
      - "9184:9184"
    command: memcached -m 256 -I 10m -p 9184
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9184"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
